services:
  db:
    image: postgres:16-alpine
    container_name: grindnsharpen_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: grindnsharpen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grindnsharpen"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: src/Dockerfile
      target: production
    container_name: grindnsharpen_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
      DB_HOST: db
      DB_PORT: 5433
      DB_NAME: grindnsharpen
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: grindnsharpen_postgres_data
